esphome:
  name: ${device_name}
  comment: ${device_location}
  name_add_mac_suffix: false

# Enable logging
logger:

# Enable Home Assistant API
#wifi:
#  networks:
#    - ssid: !secret wifi_ssid
#      password: !secret wifi_password
#  ap:
#    ssid: ${device_name}
#    password: !secret ap_password
wifi:
  networks:
    ssid: !secret wifi_ssid
    password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret ap_password
  output_power: 13dBm
  fast_connect: true
  power_save_mode: light

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  password: !secret ota_password
  platform: esphome

web_server:
  port: 80
  version: 3

text_sensor:
  - <<: !include ip_address.yaml
  - <<: !include location.yaml    
  - <<: !include version.yaml

binary_sensor:
  - <<: !include status.yaml

sensor:
  - <<: !include wifi_signal.yaml
  - platform: template
    name: "Device Free RAM"
    unit_of_measurement: "kB"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return (float) (esp_get_free_heap_size() / 1024.0);
  - platform: uptime
    type: seconds
    name: Uptime Sensor
    id: uptime_sensor
    update_interval: 5s

switch:
  - platform: restart
    name: "Restart"  
